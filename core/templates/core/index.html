<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>健康分析系統</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        min-height: 100vh;
      }
      .hero {
        padding: 80px 0;
        color: white;
        text-align: center;
      }
      .hero h1 {
        font-size: 3rem;
        font-weight: bold;
        margin-bottom: 20px;
      }
      .hero p {
        font-size: 1.2rem;
        opacity: 0.9;
      }
      .feature-card {
        transition: transform 0.3s, box-shadow 0.3s;
        height: 100%;
        border: none;
        border-radius: 15px;
      }
      .feature-card:hover {
        transform: translateY(-10px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      }
      .feature-icon {
        font-size: 4rem;
        margin-bottom: 20px;
      }
      .card-body {
        padding: 30px;
      }
      .btn-feature {
        width: 100%;
        padding: 12px;
        font-size: 1.1rem;
        border-radius: 10px;
      }
    </style>
  </head>
  <body>
    <!-- 導航列 -->
    <nav class="navbar navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="{% url 'index' %}">
          <strong>健康分析系統</strong>
        </a>
        <a href="/sys-admin-31264445/" class="btn btn-outline-light btn-sm"
          >管理後台</a
        >
      </div>
    </nav>

    <!-- Hero 區域 -->
    <div class="hero">
      <div class="container">
        <h1>健康分析系統</h1>
        <p>整合問卷、經絡儀、BFS、面診的全方位健康管理平台</p>
      </div>
    </div>

    <!-- 功能卡片 -->
    <div class="container pb-5">
      <div class="row g-4">
        <!-- 問卷管理 -->
        <div class="col-md-6 col-lg-3">
          <div class="card feature-card">
            <div class="card-body text-center">
              <div class="feature-icon">📋</div>
              <h4>問卷管理</h4>
              <p class="text-muted">完整的健康問卷系統</p>
              <a
                href="{% url 'questionnaire_list' %}"
                class="btn btn-success btn-feature"
                >進入管理</a
              >
            </div>
          </div>
        </div>

        <!-- 經絡儀測試 -->
        <div class="col-md-6 col-lg-3">
          <div class="card feature-card">
            <div class="card-body text-center">
              <div class="feature-icon">📊</div>
              <h4>經絡儀測試</h4>
              <p class="text-muted">上傳經絡儀檢測報告</p>
              <a
                href="{% url 'meridian_create' %}"
                class="btn btn-primary btn-feature"
                >上傳報告</a
              >
            </div>
          </div>
        </div>

        <!-- BFS 測試 -->
        <div class="col-md-6 col-lg-3">
          <div class="card feature-card">
            <div class="card-body text-center">
              <div class="feature-icon">🔬</div>
              <h4>BFS 測試</h4>
              <p class="text-muted">生物反饋測試系統</p>
              <a
                href="{% url 'bfs_create' %}"
                class="btn btn-info btn-feature text-white"
                >建立測試</a
              >
            </div>
          </div>
        </div>

        <!-- 面診記錄 -->
        <div class="col-md-6 col-lg-3">
          <div class="card feature-card">
            <div class="card-body text-center">
              <div class="feature-icon">📸</div>
              <h4>面診記錄</h4>
              <p class="text-muted">AI 面部診斷分析</p>
              <a
                href="{% url 'face_diagnosis_create' %}"
                class="btn btn-warning btn-feature"
                >上傳照片</a
              >
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
