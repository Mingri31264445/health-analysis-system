<!DOCTYPE html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>上傳 BFS 測試 - 健康分析系統</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="container mt-5">
      <div class="row justify-content-center">
        <div class="col-md-8">
          <div class="card">
            <div class="card-header bg-info text-white">
              <h3 class="mb-0">新增 BFS 測試</h3>
            </div>
            <div class="card-body">
              <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                  <label class="form-label"
                    >患者姓名 <span class="text-danger">*</span></label
                  >
                  {{ form.patient_name }} {% if form.patient_name.errors %}
                  <div class="text-danger">{{ form.patient_name.errors }}</div>
                  {% endif %}
                </div>

                <div class="mb-3">
                  <label class="form-label"
                    >測試日期 <span class="text-danger">*</span></label
                  >
                  {{ form.test_date }} {% if form.test_date.errors %}
                  <div class="text-danger">{{ form.test_date.errors }}</div>
                  {% endif %}
                </div>

                <div class="mb-3">
                  <label class="form-label">備註</label>
                  {{ form.notes }}
                </div>

                <div class="alert alert-info">
                  <strong>檔案上傳區</strong><br />
                  保留位置，未來擴充上傳 BFS 測試相關檔案功能。
                </div>

                <div class="d-flex justify-content-between">
                  <a href="{% url 'index' %}" class="btn btn-secondary">取消</a>
                  <button type="submit" class="btn btn-info text-white">
                    建立
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
